# The-Agents-Workstation
name: CI Pipeline

on:
  push:
    branches: [ "main", "develop", "improvements" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
      fail-fast: false

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Lint with ruff
      run: ruff check . --ignore=E402,F811,F401,E501

    - name: Type check with mypy
      run: mypy core/ agents/ --ignore-missing-imports || true

    - name: Test with pytest
      run: python -m pytest tests/ -v --cov=core --cov=agents --cov-report=term-missing

  security:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: pip

    - name: Install bandit
      run: pip install bandit

    - name: Run Bandit security scan
      run: bandit -r core/ agents/ -ll -f json -o bandit-report.json || true

    - name: Upload security report
      uses: actions/upload-artifact@v4
      with:
        name: security-report
        path: bandit-report.json
        retention-days: 30

  build:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: pip

    - name: Install build
      run: pip install build

    - name: Verify Dockerfile syntax
      run: |
        if [ -f docker-compose.yml ]; then
          echo "docker-compose.yml found"
        else
          echo "No docker-compose.yml found - skipping"
        fi

    - name: Build package
      run: python -m build --wheel || echo "Build not configured yet"
