# The-Agents-Workstation
name: CI Pipeline

on:
  push:
    branches: [ "main", "develop", "improvements" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Lint with ruff
      run: |
        pip install ruff
        ruff check . --ignore=E402,F811,F401,E501

    - name: Type check with mypy
      run: |
        pip install mypy
        mypy core/ agents/ --ignore-missing-imports || true

    - name: Test with pytest
      run: |
        pip install pytest pytest-asyncio pytest-mock
        python -m pytest tests/ -v --cov=core --cov=agents --cov-report=term-missing

  security:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Run Bandit security scan
      run: |
        pip install bandit
        bandit -r . -ll -f json -o bandit-report.json || true

    - name: Upload security report
      uses: actions/upload-artifact@v4
      with:
        name: security-report
        path: bandit-report.json

  build:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Verify Dockerfile syntax
      run: |
        if [ -f docker-compose.yml ]; then
          echo "docker-compose.yml found"
        else
          echo "No docker-compose.yml found - skipping"
        fi

    - name: Build package
      run: |
        pip install build
        python -m build --wheel || echo "Build not configured yet"
